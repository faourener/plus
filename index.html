<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta charset="UTF-8" />
    <!-- 优化视口配置：禁止缩放，确保适配精准 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>算术练习</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            /* 核心修改：固定视口高度，禁止滚动 */
            height:100vh;
            overflow: hidden;
            background:linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            font-family:system-ui, -apple-system, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            /* 调整内边距，避免内容溢出 */
            padding:12px;
        }
        .screen {
            /* 核心修改：基于视口高度适配，最大高度占满屏幕 */
            width:100%;
            max-width:380px;
            max-height:95vh;
            background:#fff;
            border-radius:28px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(30,58,138,.18);
            opacity:0;
            transform:translateY(20px);
            animation:fadeInUp .6s ease-out forwards;
            /* 增加内部滚动兜底（仅针对极端小屏） */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        @keyframes fadeInUp { to { opacity:1; transform:translateY(0) } }
        .hidden { display:none }

        .question-screen {
            /* 调整内边距，压缩冗余空间 */
            padding:32px 20px 24px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:20px;
            /* 弹性布局适配高度 */
            min-height: 100%;
            justify-content: space-around;
        }
        .q-number {
            font-size:1.1rem;
            font-weight:700;
            color:#4f46e5;
            letter-spacing:2px;
        }
        .expression {
            font-size:2.8rem;
            font-weight:800;
            color:#0f172a;
            letter-spacing:-1.2px;
            margin:8px 0 20px;
        }
        .answer-container {
            display:flex;
            gap:12px;
            margin-bottom:20px;
        }
        .digit-box {
            /* 缩小数字框尺寸，适配小屏 */
            width:56px;
            height:56px;
            background:#f8fafc;
            border:2.5px solid #d1d5db;
            border-radius:50%;
            font-size:2rem;
            font-weight:700;
            color:#1d4ed8;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:all .28s cubic-bezier(.34,1.56,.64,1);
            cursor:pointer;
            user-select:none;
            box-shadow:inset 0 2px 6px rgba(0,0,0,0.06), 0 3px 10px rgba(0,0,0,0.08);
        }
        .digit-box:hover { transform:scale(1.08); box-shadow:inset 0 2px 8px rgba(0,0,0,0.08), 0 6px 16px rgba(59,130,246,0.15); }
        .digit-box.filled {
            background:#dbeafe;
            border-color:#3b82f6;
            color:#1e40af;
            box-shadow:inset 0 3px 10px rgba(59,130,246,0.2), 0 6px 16px rgba(59,130,246,0.25);
            transform:scale(1.06);
        }
        .digit-box.done {
            background:#dcfce7;
            border-color:#22c55e;
            color:#166534;
            box-shadow:inset 0 3px 10px rgba(34,197,94,0.2), 0 8px 20px rgba(34,197,94,0.3);
            transform:scale(1.08);
            animation:donePop .5s ease-out;
        }
        @keyframes donePop {
            0% { transform:scale(1.06) }
            50% { transform:scale(1.16) }
            100% { transform:scale(1.08) }
        }

        .numpad {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
            width:100%;
            max-width:280px;
        }
        .numpad-btn {
            aspect-ratio:1;
            border:none;
            border-radius:50%;
            font-size:1.8rem;
            font-weight:600;
            background:#f1f5f9;
            color:#1e293b;
            cursor:pointer;
            transition:all .28s cubic-bezier(.34,1.56,.64,1);
            box-shadow:0 4px 12px rgba(0,0,0,.08);
        }
        .numpad-btn:hover { transform:scale(1.08); box-shadow:0 6px 16px rgba(0,0,0,.12); }
        .numpad-btn:active {
            transform:scale(.94);
            background:#e2e8f0;
            box-shadow:0 2px 6px rgba(0,0,0,.1);
        }

        /* 占位格子（第四行两侧空白） */
        .placeholder {
            visibility: hidden;
        }

        .stop-btn {
            margin-top:16px;
            padding:12px 48px;
            font-size:1.1rem;
            font-weight:600;
            color:white;
            background:linear-gradient(90deg,#f87171,#ef4444);
            border:none;
            border-radius:16px;
            box-shadow:0 6px 16px rgba(239,68,68,.3);
            cursor:pointer;
            transition:all .3s cubic-bezier(.34,1.56,.64,1);
        }
        .stop-btn:hover { transform:scale(1.05); box-shadow:0 8px 20px rgba(239,68,68,.4); }
        .stop-btn:active { transform:scale(.98); box-shadow:0 4px 10px rgba(239,68,68,.2); }

        .result-screen {
            /* 调整结果页内边距，适配一页展示 */
            padding:36px 24px 32px;
            text-align:center;
            min-height: 100%;
            display:flex;
            flex-direction:column;
            justify-content: center;
        }
        .title { font-size:2rem; font-weight:800; color:#1e40af; margin-bottom:32px; }
        .stats { display:flex; flex-direction:column; gap:16px; margin-bottom:36px; }
        .stat-row {
            display:flex;
            justify-content:space-between;
            font-size:1.1rem;
            padding:8px 0;
            border-bottom:1px solid #e5e7eb;
        }
        .stat-row:last-child { border-bottom:none }
        .label { color:#4b5563; font-weight:500 }
        .value { font-weight:700; color:#111827 }
        .retry-btn {
            padding:14px 64px;
            font-size:1.15rem;
            font-weight:700;
            color:white;
            background:linear-gradient(90deg,#6366f1,#4f46e5);
            border:none;
            border-radius:16px;
            box-shadow:0 8px 20px rgba(99,102,241,.35);
            cursor:pointer;
            transition:all .3s cubic-bezier(.34,1.56,.64,1);
        }
        .retry-btn:hover { transform:scale(1.05); box-shadow:0 10px 24px rgba(99,102,241,.4); }
        .retry-btn:active { transform:scale(.98); box-shadow:0 5px 12px rgba(99,102,241,.25); }
    </style>
</head>
<body>

<div class="screen" id="qs">
    <div class="question-screen">
        <div class="q-number">Q1</div>
        <div class="expression">10 × 10</div>
        <div class="answer-container" id="boxes"></div>

        <!-- 数字键盘：增加 0，样式完全统一 -->
        <div class="numpad" id="pad">
            <button class="numpad-btn">1</button>
            <button class="numpad-btn">2</button>
            <button class="numpad-btn">3</button>
            <button class="numpad-btn">4</button>
            <button class="numpad-btn">5</button>
            <button class="numpad-btn">6</button>
            <button class="numpad-btn">7</button>
            <button class="numpad-btn">8</button>
            <button class="numpad-btn">9</button>
            <div class="placeholder"></div> <!-- 左边占位 -->
            <button class="numpad-btn">0</button>
            <div class="placeholder"></div> <!-- 右边占位 -->
        </div>

        <button class="stop-btn" id="stop">停止作答</button>
    </div>
</div>

<div class="screen hidden" id="rs">
    <div class="result-screen">
        <div class="title">成绩单</div>
        <div class="stats">
            <div class="stat-row"><span class="label">答题数</span><span class="value">0</span></div>
            <div class="stat-row"><span class="label">正确数</span><span class="value">0</span></div>
            <div class="stat-row"><span class="label">错误数</span><span class="value">0</span></div>
            <div class="stat-row"><span class="label">准确率</span><span class="value">0.00%</span></div>
            <div class="stat-row"><span class="label">平均用时</span><span class="value">0"</span></div>
        </div>
        <button class="retry-btn" id="retry">再来一次</button>
    </div>
</div>

<script>
// JavaScript 部分保持不变（已包含 0 的输入支持）
const qs = document.getElementById('qs');
const rs = document.getElementById('rs');
const boxes = document.getElementById('boxes');
const pad = document.getElementById('pad');
const stopBtn = document.getElementById('stop');
const retryBtn = document.getElementById('retry');

let q = 1, a, b, prod, filled = 0;
let total = 0, right = 0, sumSec = 0;
let t0;

function newQ() {
    if (q === 1) { a = 10; b = 10 }
    else {
        do { a = 10 + Math.floor(Math.random() * 90); b = 10 + Math.floor(Math.random() * 90); }
        while ((a * b + '').includes('0'));
    }
    prod = a * b;
    const len = (prod + '').length;

    document.querySelector('.q-number').textContent = `Q${q}`;
    document.querySelector('.expression').textContent = `${a} × ${b}`;

    boxes.innerHTML = '';
    for (let i = 0; i < len; i++) {
        const d = document.createElement('div');
        d.className = 'digit-box';
        d.onclick = e => {
            if (filled > 0 && e.target === boxes.children[filled - 1] && e.target.textContent) {
                e.target.textContent = '';
                e.target.className = 'digit-box';
                filled--;
            }
        };
        boxes.appendChild(d);
    }
    filled = 0;
    t0 = Date.now();
}

function finish() {
    let val = '';
    for (let el of boxes.children) val += el.textContent;
    const isRight = +val === prod;

    for (let el of boxes.children) {
        el.className = 'digit-box done';
    }

    total++;
    if (isRight) right++;
    sumSec += (Date.now() - t0) / 1000 | 0;

    setTimeout(() => {
        for (let el of boxes.children) el.className = 'digit-box';
        q++;
        newQ();
    }, 1200);
}

pad.onclick = e => {
    if (e.target.tagName !== 'BUTTON') return;
    if (filled >= boxes.children.length) return;
    const box = boxes.children[filled];
    box.textContent = e.target.textContent;
    box.className = 'digit-box filled';
    filled++;
    if (filled === boxes.children.length) finish();
};

stopBtn.onclick = () => {
    qs.classList.add('hidden');
    rs.classList.remove('hidden');
    const v = rs.querySelectorAll('.value');
    v[0].textContent = total;
    v[1].textContent = right;
    v[2].textContent = total - right;
    v[3].textContent = total ? (right / total * 100).toFixed(2) + '%' : '0.00%';
    v[4].textContent = total ? Math.round(sumSec / total) + '"' : '0"';
};

retryBtn.onclick = () => {
    rs.classList.add('hidden');
    qs.classList.remove('hidden');
    total = right = sumSec = 0;
    q = 1;
    newQ();
};

newQ();
</script>
</body>
</html>
